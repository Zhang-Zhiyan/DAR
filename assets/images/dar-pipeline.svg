<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img">
<rect width="1200" height="420" fill="#ffffff"/>
<g font-family="Arial, sans-serif"><text x="62" y="55" font-size="23" font-weight="700" fill="#182420">DAR-R1 two-stage training pipeline</text>
<rect x="60" y="105" width="200" height="180" rx="18" fill="#eff6f0" stroke="#c9dfd0"/><text x="86" y="142" font-size="15" font-weight="700" fill="#1f7a5b">INPUT</text><rect x="86" y="164" width="148" height="73" rx="9" fill="#2e5040"/><circle cx="128" cy="200" r="17" fill="#b5e9c9"/><path d="M123 190l21 10-21 10z" fill="#174531"/><text x="86" y="264" font-size="17" font-weight="700" fill="#182420">Video + task prompt</text>
<path d="M278 195h87" stroke="#8fa99b" stroke-width="4"/><path d="M352 184l20 11-20 11z" fill="#8fa99b"/>
<rect x="382" y="105" width="222" height="180" rx="18" fill="#fff8e9" stroke="#ecdcae"/><text x="408" y="142" font-size="15" font-weight="700" fill="#a77616">STAGE 1</text><text x="408" y="181" font-size="21" font-weight="700" fill="#182420">Cold-start SFT</text><text x="408" y="212" font-size="15" fill="#65726d">Learn the output format:</text><text x="408" y="237" font-size="15" fill="#65726d">timestamps, emotion, reason</text>
<path d="M622 195h87" stroke="#8fa99b" stroke-width="4"/><path d="M696 184l20 11-20 11z" fill="#8fa99b"/>
<rect x="726" y="105" width="222" height="180" rx="18" fill="#eef1fb" stroke="#cfd7ee"/><text x="752" y="142" font-size="15" font-weight="700" fill="#4d66a6">STAGE 2</text><text x="752" y="181" font-size="21" font-weight="700" fill="#182420">GRPO refinement</text><text x="752" y="212" font-size="15" fill="#65726d">Optimize boundaries, labels,</text><text x="752" y="237" font-size="15" fill="#65726d">structure, and grounded reasons</text>
<path d="M966 195h87" stroke="#8fa99b" stroke-width="4"/><path d="M1040 184l20 11-20 11z" fill="#8fa99b"/>
<rect x="1070" y="105" width="92" height="180" rx="18" fill="#173f31"/><text x="1091" y="142" font-size="14" font-weight="700" fill="#b5e9c9">OUTPUT</text><text x="1090" y="182" font-size="16" font-weight="700" fill="#fff">start</text><text x="1090" y="208" font-size="16" font-weight="700" fill="#fff">end</text><text x="1090" y="234" font-size="16" font-weight="700" fill="#fff">emotion</text><text x="1090" y="260" font-size="16" font-weight="700" fill="#fff">reason</text>
<text x="60" y="356" font-size="15" fill="#65726d">The first stage teaches reliable structured generation; the second stage directly rewards the quality of dynamic affective reasoning.</text></g></svg>
